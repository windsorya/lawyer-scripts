<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>打卡</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  body{margin:0;display:flex;align-items:center;justify-content:center;
       height:100vh;font-family:-apple-system,sans-serif;font-size:18px;
       text-align:center;background:#f7f3ee;}
  #wrap{padding:24px;line-height:2.2;}
  .icon{font-size:56px;margin-bottom:16px;}
  #st{color:#444;}
  #err{color:#c00;font-size:13px;margin-top:12px;word-break:break-all;text-align:left;}
</style>
</head>
<body>
<div id="wrap"><div class="icon">📍</div><div id="st">初始化中…</div><div id="err"></div></div>
<script>
(async function(){
  const el  = document.getElementById('st');
  const err = document.getElementById('err');
  const GAS = 'https://script.google.com/macros/s/AKfycbxh0kpw8u3eXj5pM__nvQypfx9nws1XGR1iDA6s0G3Nq1zQ_dFj5lICvB5JWDVM5vlt/exec';

  // Step 1: liff.init
  try {
    await liff.init({ liffId: '2009829573-INMBsweY' });
  } catch(e) {
    el.textContent = '⚠️ LIFF 初始化失敗';
    err.textContent = '[init] ' + (e.code || '') + ': ' + e.message;
    return;
  }

  // Step 2: read type after init (liff decodes liff.state)
  const params = new URLSearchParams(window.location.search);
  const type   = params.get('type') || 'checkin';
  const token  = liff.getAccessToken();

  el.textContent = '取得位置中…';

  // Step 3: GPS
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      el.textContent = '打卡中…';

      // Step 4: JSONP → GAS（不用 liff.sendMessages()，繞過 chat_message 授權問題）
      const cbName = '__liff' + Date.now();
      let timer;

      window[cbName] = function(result) {
        clearTimeout(timer);
        delete window[cbName];
        const s = document.getElementById('liff_sc');
        if (s) s.parentNode.removeChild(s);
        if (result.ok) {
          el.textContent = '✅ ' + (result.msg || '完成！');
          setTimeout(() => liff.closeWindow(), 1200);
        } else {
          el.textContent = '⚠️ ' + (result.msg || '打卡失敗');
          err.textContent = result.err || '';
        }
      };

      const sc = document.createElement('script');
      sc.id  = 'liff_sc';
      sc.src = GAS + '?action=liff_checkin&type=' + encodeURIComponent(type)
             + '&lat=' + lat + '&lng=' + lng
             + '&token=' + encodeURIComponent(token)
             + '&callback=' + cbName;
      sc.onerror = () => {
        clearTimeout(timer);
        el.textContent = '⚠️ 網路錯誤，請重試';
        err.textContent = 'JSONP script load failed';
      };

      timer = setTimeout(() => {
        el.textContent = '⚠️ 逾時，請重試';
        err.textContent = 'JSONP timeout (15s)';
      }, 15000);

      document.head.appendChild(sc);
    },
    gpsErr => {
      el.textContent = '⚠️ 請允許位置存取後重試';
      err.textContent = '[GPS] code=' + gpsErr.code + ': ' + gpsErr.message;
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
})();
</script>
</body>
</html>

    function parseToMonths(str) {
      if (!str) return 0;
      let m = 0;
      const y = str.match(/(\d+)年/), mo = str.match(/([\d.]+)月/), d = str.match(/(\d+)日/);
      if (y) m += parseInt(y[1]) * 12;
      if (mo) m += parseFloat(mo[1]);
      if (d) m += parseInt(d[1]) / 30;
      return m;
    }
    function formatMonths(m) {
      if (m <= 0) return "—";
      if (m < 1) return `${Math.round(m * 30)}日`;
      if (m < 12) return `${m.toFixed(1)}月`;
      const y = Math.floor(m / 12), r = m % 12;
      return r < 0.1 ? `${y}年` : `${y}年${r.toFixed(1)}月`;
    }

    function tryCrossLookup(lawKey, tags) {
      if (tags.length < 2) return null;
      for (let len = Math.min(tags.length, 4); len >= 2; len--) {
        const combos = getCombinations(tags, len);
        for (const combo of combos) {
          const key = [lawKey, ...combo.sort()].join("|");
          if (CROSS_FACTOR_LOOKUP[key]) return { ...CROSS_FACTOR_LOOKUP[key], matchLen: len, key };
        }
      }
      return null;
    }
    function getCombinations(arr, len) {
      if (len === 1) return arr.map(x => [x]);
      const r = [];
      for (let i = 0; i < arr.length; i++) {
        getCombinations(arr.slice(i + 1), len - 1).forEach(c => r.push([arr[i], ...c]));
      }
      return r;
    }

    function BarChart({ data, highlightRange, label }) {
      const max = Math.max(...data.map(d => d.count));
      const [hovered, setHovered] = useState(null);
      return (
        <div style={{ background: "rgba(15,23,42,0.6)", borderRadius: 12, padding: "14px 14px 10px", border: "1px solid rgba(51,65,85,0.5)", backdropFilter: "blur(8px)" }}>
          {label && <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 10, fontWeight: 600, letterSpacing: "0.5px" }}>{label}</div>}
          <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 140, padding: "0 4px", borderBottom: "1px solid rgba(71,85,105,0.3)" }}>
            {data.map((d, i) => {
              const h = max > 0 ? (d.count / max) * 118 : 0;
              const hl = highlightRange === d.range;
              const isHov = hovered === i;
              return (
                <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, cursor: d.count > 0 ? "pointer" : "default" }}
                  onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)}>

    function ProbationGauge({ rate, size }) {
      const s = size || 100;
      const stroke = 9;
      const r = (s - stroke) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (Math.min(rate, 100) / 100) * circ;
      const color = rate > 50 ? "#10b981" : rate > 15 ? "#eab308" : rate > 5 ? "#f97316" : "#ef4444";
      const glow = rate > 50 ? "rgba(16,185,129,0.25)" : rate > 15 ? "rgba(234,179,8,0.2)" : rate > 5 ? "rgba(249,115,22,0.2)" : "rgba(239,68,68,0.2)";
      return (
        <div style={{ position: "relative", width: s, height: s, filter: `drop-shadow(0 0 8px ${glow})` }}>
          <svg width={s} height={s} style={{ transform: "rotate(-90deg)" }}>
            <circle cx={s/2} cy={s/2} r={r} fill="none" stroke="#1e293b" strokeWidth={stroke} />
            <circle cx={s/2} cy={s/2} r={r} fill="none" stroke="rgba(51,65,85,0.3)" strokeWidth={stroke} />
            <circle cx={s/2} cy={s/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
              strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
              style={{ transition: "stroke-dashoffset 1s cubic-bezier(0.34, 1.56, 0.64, 1)", filter: "brightness(1.1)" }} />
          </svg>

            <span style={{ fontSize: s * 0.24, fontWeight: 900, color, letterSpacing: "-0.5px" }}>{rate.toFixed(1)}%</span>

      const lawOptions = crimeData ? Object.keys(crimeData.laws) : [];
      const lawData = crimeData && law ? crimeData.laws[law] : null;
      const factorGroups = lawData ? lawData.factors : {};

      useEffect(() => { if (lawOptions.length > 0 && !law) setLaw(lawOptions[0]); }, [crime]);
      useEffect(() => { setSelections({}); setShowResult(false); }, [law]);

      const prediction = useMemo(() => {
        if (!lawData) return null;
        const baseMonths = parseToMonths(lawData.recentBaseline?.avg || lawData.baseline.avg);
        let appliedFactors = [], tags = [];

        Object.entries(selections).forEach(([group, choice]) => {
          if (!choice || !factorGroups[group]?.options?.[choice]) return;
          const f = factorGroups[group].options[choice];
          appliedFactors.push({
            label: `${group}: ${choice}`, effect: f.delta || 0, n: f.n, tag: f.tag,
            note: f.note || (f.n > 0 && f.n < 10 ? "樣本過少" : f.n > 0 && f.n < 50 ? "樣本偏少" : null),
          });
          if (f.tag) tags.push(f.tag);
        });

        let crossMatch = tags.length >= 2 ? tryCrossLookup(lawData.lawKey, tags) : null;
        let predicted, method;
        if (crossMatch?.n > 0) {
          predicted = parseToMonths(crossMatch.avg);
          method = `交叉查表（${crossMatch.matchLen}因子，n=${crossMatch.n.toLocaleString()}）`;
        } else {
          const totalDelta = appliedFactors.reduce((s, f) => s + (f.effect || 0), 0);
          predicted = Math.max(0.5, baseMonths + totalDelta);
          method = appliedFactors.length === 0 ? "基準線" : "加法模型";
        }
        const minSample = appliedFactors.reduce((min, f) => (f.n > 0 && f.n < min ? f.n : min), Infinity);
        const confidence = appliedFactors.length === 0 ? "基準線"
          : crossMatch?.n > 100 ? "高（精確交叉數據）"
          : crossMatch?.n > 0 ? "中（交叉樣本偏少）"
          : minSample < 10 ? "低（樣本不足）" : minSample < 100 ? "中" : "高";

        const lk = lawData.lawKey;
        const probBase = PROBATION_LOOKUP[lk];
        const baseRate = probBase ? getProbationRate(probBase) : null;
        let probMatch = null, probRate = baseRate;
        if (tags.length >= 1 && lk) {
          for (let len = Math.min(tags.length, 3); len >= 1; len--) {
            const combos = getCombinations(tags, len);
            for (const combo of combos) {
              const key = [lk, ...combo.sort()].join("|");
              if (PROBATION_LOOKUP[key]) { probMatch = { ...PROBATION_LOOKUP[key], key, matchLen: len }; probRate = getProbationRate(probMatch); break; }
            }
            if (probMatch) break;
          }
        }

        let probQualifiers = [];
        const has = tag => tags.includes(tag);
        const minBase = parseToMonths(lawData.baseline.min);

        // 計算考量減刑因素後的有效最低刑（供緩刑門檻判斷用）
        let effectiveMin = minBase;
        const reductionParts = [];
        if (has("§17Ⅱ")) { effectiveMin = Math.round(effectiveMin * 0.5); reductionParts.push("§17Ⅱ供出上游必減½"); }
        if (has("未遂")) { effectiveMin = Math.round(effectiveMin * 0.5); reductionParts.push("未遂§25得減½"); }
        if (has("§59") && minBase >= 36) { effectiveMin = Math.round(effectiveMin * 0.5); reductionParts.push("§59情堪憫恕"); }
        const hasReductions = reductionParts.length > 0;

        // §74 緩刑門檻（宣告刑2年以下）
        if (effectiveMin >= 36) {
          if (hasReductions) {
            probQualifiers.push({ text: `法定最低刑${formatMonths(minBase)}，考量${reductionParts.join("+")}後約${formatMonths(effectiveMin)}，仍超緩刑門檻（§74需2年以下）`, type: "bad" });
          } else {
            probQualifiers.push({ text: `法定最低刑${formatMonths(minBase)}，不符緩刑門檻（§74需2年以下）`, type: "bad" });
          }
        } else if (effectiveMin >= 24) {
          if (hasReductions && minBase >= 36) {
            probQualifiers.push({ text: `法定最低刑${formatMonths(minBase)}，考量${reductionParts.join("+")}後降至${formatMonths(effectiveMin)}，緩刑邊緣（§74宣告刑須2年以下，差${effectiveMin - 24}月）`, type: "warn" });
          } else {
            probQualifiers.push({ text: `法定最低刑${formatMonths(minBase)}，緩刑空間極窄`, type: "warn" });
          }
        } else if (minBase >= 36) {
          // 法定刑高，但透過減刑因素已進入緩刑門檻
          probQualifiers.push({ text: `法定最低刑${formatMonths(minBase)}，透過${reductionParts.join("+")}有效最低刑降至${formatMonths(effectiveMin)}，已符緩刑門檻（§74）`, type: "good" });
        }

        if (has("累犯")) probQualifiers.push({ text: "累犯：緩刑受嚴格限制（§74Ⅰ②），僅「宣判時」距前案執行完畢逾5年者仍有機會", type: "warn" });
        if (has("坦承") && has("已和解")) probQualifiers.push({ text: "坦承+和解：緩刑最佳組合", type: "good" });
        else if (has("坦承") && has("賠償")) probQualifiers.push({ text: "坦承+賠償：竊盜案中有利緩刑", type: "good" });
        if (has("否認")) probQualifiers.push({ text: "否認犯罪：大幅降低緩刑機會", type: "bad" });
        if (has("未和解") || has("未賠償")) probQualifiers.push({ text: "未和解/未賠償：緩刑機會大幅降低", type: "warn" });
        // §59 顯示：若已在上方高刑度減算中顯示過，不重複；否則顯示一般說明
        if (has("§59") && !(minBase >= 36 && effectiveMin < 24)) probQualifiers.push({ text: "§59 情堪憫恕：可大幅降低刑度，進入緩刑門檻", type: "good" });

        if (lk === "§339" && tags.length === 0) {
          probQualifiers.push({ text: "整體緩刑率 16.6%（1,748/10,513）", type: "info" });
          probQualifiers.push({ text: "和解是緩刑的幾乎必要條件", type: "info" });
        } else if (lk === "§339-4" && tags.length === 0) {
          probQualifiers.push({ text: "整體緩刑率僅 7.6%，§59+和解是唯一高效路徑", type: "warn" });
        }
        if (probQualifiers.length === 0 && minBase < 24) {
          probQualifiers.push({ text: "請選擇案件條件以獲得更精確的緩刑分析", type: "info" });
        }

        return {
          baseMonths, predicted, method,
          min: parseToMonths(lawData.baseline.min), max: parseToMonths(lawData.baseline.max),
          appliedFactors, confidence, crossMatch,
          distribution: lawData.distribution,
          probRate: probRate ?? 0, probMatch, baseRate: baseRate ?? 0, probQualifiers,
        };
      }, [lawData, selections]);

      const handlePredict = () => {
        setShowResult(true);
        setTimeout(() => resultRef.current?.scrollIntoView({ behavior: "smooth", block: "start" }), 100);
      };
      const getHighlightRange = (m) => {
        if (m <= 6) return "6月以下"; if (m <= 12) return "6月~1年";
        if (m <= 18) return "1年~1.5年"; if (m <= 24) return "1.5年~2年";
        if (m <= 30) return "2年~2.5年"; if (m <= 36) return "2.5年~3年";
        return "3年以上";
      };
      const confColor = c => c.includes("高") ? "#34d399" : c.includes("中") ? "#fbbf24" : c === "基準線" ? "#94a3b8" : "#f87171";
      const factorIcon = {"犯後態度":"🗣️","和解狀況":"🤝","被害金額":"💰","加減刑事由":"⚖️","前案紀錄":"📋","共犯角色":"👥","特殊情況":"📌","酒測值":"🍺","行為態樣":"🔄","賠償狀況":"💴","竊盜金額":"💰","加重事由":"⚠️","特殊情狀":"📎","傷勢程度":"🩹"};

      return (
        <div ref={containerRef} style={{ minHeight: "100vh", background: "#0f172a", color: "#e2e8f0", fontFamily: "'Noto Sans TC', 'SF Pro Display', -apple-system, sans-serif" }}>
          <div style={{ background: "linear-gradient(135deg, #1e293b, #0f172a, #1a1a2e)", borderBottom: "1px solid rgba(59,130,246,0.2)", padding: "14px 16px 12px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 38, height: 38, borderRadius: 10, background: "linear-gradient(135deg, #3b82f6, #8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, boxShadow: "0 4px 12px rgba(59,130,246,0.3)" }}>⚖️</div>
              <div style={{ flex: 1 }}>
                <p style={{ margin: "0 0 3px 0", fontSize: 13, color: "#60a5fa", letterSpacing: "2px", fontWeight: 700 }}>王志文律師</p>
                <h1 style={{ margin: 0, fontSize: 17, fontWeight: 800, color: "#f8fafc", lineHeight: 1.2 }}>量刑分析系統 <span style={{ fontSize: 10, color: "#64748b", fontWeight: 400 }}>v3.2</span></h1>
                <p style={{ margin: "2px 0 0 0", fontSize: 10, color: "#64748b" }}>司法院量刑資訊系統 · 10罪名 · 含緩刑機會分析</p>
              </div>
              <button onClick={toggleFullscreen} title={isFullscreen ? "收合顯示" : "展開顯示"} style={{ width: 36, height: 36, borderRadius: 8, border: "1px solid #334155", background: isFullscreen ? "rgba(59,130,246,0.2)" : "rgba(30,41,59,0.6)", color: isFullscreen ? "#60a5fa" : "#94a3b8", fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s" }}>
                {isFullscreen ? "⊟" : "⊞"}
              </button>
            </div>
          </div>

          <div style={{ padding: isFullscreen ? "14px 8px" : "14px 14px", maxWidth: isFullscreen ? "100%" : 640, margin: "0 auto", transition: "all 0.3s ease" }}>
            <div style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, display: "block", marginBottom: 6 }}>① 罪名</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {Object.keys(CRIME_DATA).map(c => (
                  <button key={c} onClick={() => { setCrime(c); setLaw(""); setSelections({}); setShowResult(false); }}
                    style={{ padding: "6px 13px", borderRadius: 7, border: `1px solid ${crime === c ? "#3b82f6" : "#334155"}`, background: crime === c ? "rgba(59,130,246,0.15)" : "transparent", color: crime === c ? "#60a5fa" : "#94a3b8", fontSize: 12, fontWeight: crime === c ? 700 : 400, cursor: "pointer" }}>{c}</button>
                ))}
              </div>
            </div>

            {crimeData && (
              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, display: "block", marginBottom: 6 }}>② 適用法條</label>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {lawOptions.map(l => (
                    <button key={l} onClick={() => { setLaw(l); setSelections({}); setShowResult(false); }}
                      style={{ padding: "9px 13px", borderRadius: 7, border: `1px solid ${law === l ? "#3b82f6" : "#1e293b"}`, background: law === l ? "rgba(59,130,246,0.1)" : "#1e293b", color: law === l ? "#60a5fa" : "#cbd5e1", fontSize: 13, fontWeight: law === l ? 600 : 400, cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between" }}>
                      <span>{l}</span>
                      <span style={{ fontSize: 10, color: "#64748b" }}>n={crimeData.laws[l].baseline.n.toLocaleString()}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {lawData && (
              <div style={{ background: "#1e293b", borderRadius: 10, padding: 12, marginBottom: 14, border: "1px solid #334155" }}>
                <div style={{ fontSize: 11, color: "#64748b", marginBottom: 5 }}>基準線</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                  <div><div style={{ fontSize: 20, fontWeight: 800, color: "#f8fafc" }}>{(lawData.recentBaseline || lawData.baseline).avg}</div><div style={{ fontSize: 10, color: "#64748b" }}>平均</div></div>
                  <div><div style={{ fontSize: 14, fontWeight: 600, color: "#059669" }}>{lawData.baseline.min}</div><div style={{ fontSize: 10, color: "#64748b" }}>最低</div></div>
                  <div><div style={{ fontSize: 14, fontWeight: 600, color: "#dc2626" }}>{lawData.baseline.max}</div><div style={{ fontSize: 10, color: "#64748b" }}>最高</div></div>
                </div>
              </div>
            )}

            {lawData && Object.keys(factorGroups).length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, display: "block", marginBottom: 8 }}>③ 案件條件</label>
                {Object.entries(factorGroups).map(([group, gd]) => (
                  <div key={group} style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 12, color: "#cbd5e1", fontWeight: 600, marginBottom: 5 }}>
                      {factorIcon[group]||"📎"} {group}
                    </div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                      {Object.entries(gd.options).map(([name, od]) => {
                        const sel = selections[group] === name;
                        const dc = od.delta < 0 ? "#059669" : od.delta > 0 ? "#dc2626" : "#64748b";
                        return (
                          <button key={name} onClick={() => { setSelections(p => ({ ...p, [group]: p[group] === name ? undefined : name })); setShowResult(false); }}
                            style={{ padding: "6px 11px", borderRadius: 7, border: `1px solid ${sel ? dc : "#334155"}`, background: sel ? `${dc}18` : "#0f172a", color: sel ? "#f8fafc" : "#94a3b8", fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
                            <span>{name}</span>
                            <span style={{ fontSize: 10, color: dc, fontWeight: 700 }}>{od.delta > 0 ? "+" : ""}{od.delta}月</span>
                          </button>
                        );
                      })}
                    </div>
                    {selections[group] && gd.options[selections[group]]?.note && (
                      <div style={{ marginTop: 5, padding: "6px 10px", borderRadius: 6, background: "rgba(251,191,36,0.06)", border: "1px solid rgba(251,191,36,0.15)", fontSize: 11, color: "#fbbf24", lineHeight: 1.5, display: "flex", gap: 5, alignItems: "flex-start" }}>
                        <span style={{ flexShrink: 0 }}>💡</span>
                        <span>{gd.options[selections[group]].note}</span>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {lawData && (
              <button onClick={handlePredict} style={{ width: "100%", padding: "12px", borderRadius: 10, border: "none", cursor: "pointer", background: "linear-gradient(135deg, #3b82f6, #8b5cf6)", color: "#fff", fontSize: 15, fontWeight: 700, boxShadow: "0 4px 16px rgba(59,130,246,0.3)", marginBottom: 18 }}>
                ⚖️ 預測量刑 &amp; 緩刑機會
              </button>
            )}

            {showResult && prediction && (
              <div ref={resultRef} style={{ background: "linear-gradient(135deg, #1e293b, #1a1a2e)", borderRadius: 14, padding: 16, marginBottom: 18, border: "1px solid rgba(59,130,246,0.2)", boxShadow: "0 8px 32px rgba(0,0,0,0.3)", animation: "fadeIn 0.5s ease-out" }}>
                <style>{`@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }`}</style>
                <div style={{ display: "flex", gap: 3, marginBottom: 14, background: "#0f172a", borderRadius: 8, padding: 3 }}>
                  {[{ key: "predict", label: "⚖️ 量刑預測" }, { key: "probation", label: "🏛️ 緩刑機會" }].map(t => (
                    <button key={t.key} onClick={() => setActiveTab(t.key)} style={{ flex: 1, padding: "7px 10px", borderRadius: 6, border: "none", cursor: "pointer", background: activeTab === t.key ? "#334155" : "transparent", color: activeTab === t.key ? "#f8fafc" : "#64748b", fontSize: 12, fontWeight: activeTab === t.key ? 700 : 400 }}>{t.label}</button>
                  ))}
                </div>

                {activeTab === "predict" && (
                  <>
                    <div style={{ textAlign: "center", marginBottom: 10 }}>
                      <div style={{ fontSize: 11, color: "#64748b" }}>預測量刑</div>
                      <div style={{ fontSize: 34, fontWeight: 900, background: "linear-gradient(135deg, #60a5fa, #a78bfa)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>{formatMonths(prediction.predicted)}</div>
                      <div style={{ display: "flex", justifyContent: "center", gap: 5, marginTop: 3, flexWrap: "wrap" }}>
                        <span style={{ padding: "2px 8px", borderRadius: 12, fontSize: 10, fontWeight: 600, background: `${confColor(prediction.confidence)}15`, color: confColor(prediction.confidence) }}>{prediction.confidence}</span>
                        <span style={{ padding: "2px 8px", borderRadius: 12, fontSize: 10, background: "rgba(59,130,246,0.1)", color: "#60a5fa" }}>{prediction.method}</span>
                      </div>
                    </div>
                    <SentenceGauge avgMonths={prediction.predicted} minMonths={prediction.min} maxMonths={prediction.max} />
                    {prediction.appliedFactors.length > 0 && (
                      <div style={{ marginTop: 10 }}>
                        <div style={{ fontSize: 11, color: "#64748b", marginBottom: 5 }}>已套用因子</div>
                        {prediction.appliedFactors.map((f, i) => {
                          const c = f.effect < 0 ? "#059669" : f.effect > 0 ? "#dc2626" : "#64748b";
                          return (
                            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "5px 9px", borderRadius: 6, background: `${c}08`, border: `1px solid ${c}18`, marginBottom: 3 }}>
                              <span style={{ fontSize: 12, color: "#e2e8f0" }}>{f.label}</span>
                              <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                                {f.note && <span style={{ fontSize: 9, color: "#94a3b8" }}>{f.note}</span>}
                                <span style={{ fontSize: 11, fontWeight: 700, color: c }}>{f.effect > 0 ? "+" : ""}{f.effect.toFixed(1)}月</span>
                              </div>
                            </div>
                          );
                        })}
                        {prediction.crossMatch && (
                          <div style={{ marginTop: 6, padding: "5px 9px", borderRadius: 6, background: "rgba(139,92,246,0.08)", border: "1px solid rgba(139,92,246,0.18)", fontSize: 11, color: "#a78bfa" }}>
                            ✨ 精確交叉數據：n={prediction.crossMatch.n.toLocaleString()}
                          </div>
                        )}
                      </div>
                    )}
                    {prediction.distribution && (
                      <div style={{ marginTop: 14 }}>
                        <BarChart data={prediction.distribution} highlightRange={getHighlightRange(prediction.predicted)} label="歷史判決分佈" />
                      </div>
                    )}
                  </>
                )}

                {activeTab === "probation" && (
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 14 }}>
                      <ProbationGauge rate={prediction.probRate} size={100} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: "#f8fafc", marginBottom: 4 }}>
                          {prediction.probMatch ? "條件匹配緩刑率" : "整體緩刑率"}
                        </div>
                        {prediction.probMatch && (
                          <div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 4 }}>
                            匹配：{prediction.probMatch.key.split("|").slice(1).join(" + ")}
                          </div>
                        )}
                      </div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                      {prediction.probQualifiers.map((q, i) => {
                        const c = q.type === "good" ? "#059669" : q.type === "bad" ? "#dc2626" : q.type === "warn" ? "#f97316" : "#64748b";
                        const icon = q.type === "good" ? "✅" : q.type === "bad" ? "❌" : q.type === "warn" ? "⚠️" : "ℹ️";
                        return (
                          <div key={i} style={{ padding: "7px 10px", borderRadius: 7, background: `${c}0a`, border: `1px solid ${c}18`, fontSize: 12, color: "#e2e8f0", display: "flex", gap: 6, alignItems: "flex-start" }}>
                            <span>{icon}</span><span>{q.text}</span>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{ marginTop: 14, padding: 12, borderRadius: 8, background: "#0f172a", border: "1px solid #334155" }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: "#f8fafc", marginBottom: 8 }}>📌 緩刑條件（刑法§74）</div>
                      <div style={{ fontSize: 11, color: "#cbd5e1", lineHeight: 1.8 }}>
                        <div>1. 受<b>2年以下有期徒刑</b>、拘役或罰金之宣告</div>
                        <div>2. 未曾因故意犯罪受有期徒刑以上刑之宣告；或執行完畢5年內未再犯</div>
                      </div>
                    </div>
                  </div>
                )}

                <div style={{ marginTop: 14, padding: 8, borderRadius: 6, background: "rgba(234,179,8,0.04)", border: "1px solid rgba(234,179,8,0.1)", fontSize: 10, color: "#94a3b8", lineHeight: 1.5 }}>
                  <b style={{ color: "#fbbf24" }}>⚠️</b> 本預測基於歷史統計，供律師內部參考，不代表個案判決結果。
                </div>
              </div>
            )}

            <div style={{ textAlign: "center", padding: "18px 0 14px", fontSize: 10, color: "#475569", lineHeight: 1.6 }}>
              <span style={{ letterSpacing: "2px", fontWeight: 700, color: "#60a5fa", fontSize: 11 }}>王志文律師</span>
              <br />
              <span>司法院量刑資訊系統 · 10罪名 · 2026-03-24 更新</span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SentencingPredictor));
  </script>
</body>
</html>
